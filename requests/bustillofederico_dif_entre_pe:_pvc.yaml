# ═══════════════════════════════════════════════════════════════
# BeamScan Simulation Request
# Comparación: PE vs PVC
# ═══════════════════════════════════════════════════════════════

# Autor
author: "Federico Bustillo"

# Descripción del experimento
description: "Comparación entre Polietileno (PE) y PVC usando electrones"

# ─── Beam Settings ───
beam:
  particle: "e-"              # Electrones
  momenta_GeV: [3.0, 6.0]      # Energías a simular
  num_events: 10000           # Eventos por configuración

# ─── Target Materials ───
materials:
  - name: "PE"
    geant4_name: "G4_POLYETHYLENE"
    thickness_mm: 10.0

  - name: "PVC"
    geant4_name: "G4_POLYVINYL_CHLORIDE"
    thickness_mm: 10.0

# ─── Outputs ───
outputs:
  highland_prediction: true
  geant4_simulation: true
  classification_plot: true
  distribution_overlay: true
  comparison_table: true
